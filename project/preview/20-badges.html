<!doctype html><html lang="he" dir="rtl"><head>
<meta charset="utf-8">
<title>Badges & tags</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .badge {
    display:inline-flex; align-items:center; gap:8px;
    padding: 6px 14px;
    border-radius: 999px;
    font-family: var(--font-latin-text);
    font-size: 11px;
    letter-spacing: .08em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .badge.navy { background: var(--ewo-navy); color: var(--ewo-cream); }
  .badge.cream { background: var(--ewo-cream); color: var(--ewo-navy-deep); }
  .badge.peach { background: var(--ewo-peach); color: var(--ewo-navy-deep); }
  .badge.outline { background: transparent; color: var(--ewo-cream); box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--ewo-cream) 60%, transparent); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
</style>
</head><body>
<div class="card">
  <div class="col" style="gap:6px;">
    <div class="label" style="direction:ltr;">Tags · season chips · status</div>
  </div>
  <div class="row" style="gap:10px; flex-wrap:wrap;">
    <span class="badge navy"><span class="dot"></span>Sold Out</span>
    <span class="badge cream">Season 2026/27</span>
    <span class="badge peach">Subscriber preview</span>
    <span class="badge outline">Tel Aviv</span>
    <span class="badge outline">Jerusalem</span>
    <span class="badge outline">Haifa</span>
  </div>
</div>
</body></html>
