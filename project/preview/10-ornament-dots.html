<!doctype html><html lang="en" dir="ltr"><head>
<meta charset="utf-8">
<title>Dot-and-diamond ornament</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .ornament { color: var(--ewo-navy); letter-spacing: .35em; font-size: 22px; line-height: 1; font-family: serif; }
  .ornament.small { font-size: 14px; }
  .demo { display:flex; flex-direction:column; align-items:center; gap:14px; padding:18px 0; }
</style>
</head><body>
<div class="card">
  <div class="col" style="gap:6px;">
    <div class="label">Dot-and-diamond ornament · in-text decoration</div>
    <div style="font-family:var(--font-latin-text); font-size:13px; line-height:1.5; color:var(--ewo-cream); opacity:.92;">
      Used as a divider between a program title and its soloist. Navy at full strength on terracotta, on cream, or reversed in cream over photos.
    </div>
  </div>
  <div class="demo">
    <div style="font-family:var(--font-hebrew-display); font-weight:900; font-size:32px; color:var(--ewo-cream);">בחזרה אל "שוטי הנבואה"</div>
    <div class="ornament">·  ·  ·  ◆  ·  ·  ·</div>
    <div style="font-family:var(--font-hebrew-display); font-weight:400; font-size:22px; color:var(--ewo-cream); opacity:.95;">אברהם טל</div>
  </div>
  <div class="row" style="justify-content:center; gap:24px;">
    <span class="ornament small">·  ·  ·  ◆  ·  ·  ·</span>
    <span class="ornament">·  ·  ·  ◆  ·  ·  ·</span>
    <span class="ornament" style="font-size:28px;">·  ·  ·  ◆  ·  ·  ·</span>
  </div>
</div>
</body></html>
