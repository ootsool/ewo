<!doctype html><html lang="en" dir="ltr"><head>
<meta charset="utf-8">
<title>Decorative shapes</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body>
<div class="card">
  <div class="col" style="gap:6px;">
    <div class="label">Decorative shape vocabulary</div>
    <div style="font-family:var(--font-latin-text); font-size:13px; line-height:1.45; color:var(--ewo-cream); opacity:.92;">
      Three motifs anchor portraits to the bottom of the frame. Never used standalone — always paired with the wings illustration.
    </div>
  </div>
  <div class="row" style="gap:32px; justify-content:space-around; padding-top:6px;">
    <div class="col" style="align-items:center; gap:10px;">
      <svg viewBox="0 0 120 60" width="140" height="70" aria-hidden="true">
        <path d="M 10 60 A 50 50 0 0 1 110 60 Z" fill="#3E5068"/>
      </svg>
      <div class="value" style="opacity:.85;">Navy half-disc</div>
    </div>
    <div class="col" style="align-items:center; gap:10px;">
      <svg viewBox="0 0 200 30" width="200" height="34" aria-hidden="true">
        <g fill="#E1957F">
          <circle cx="20"  cy="15" r="14"/>
          <circle cx="56"  cy="15" r="14"/>
          <circle cx="92"  cy="15" r="14"/>
          <circle cx="128" cy="15" r="14"/>
          <circle cx="164" cy="15" r="14"/>
        </g>
      </svg>
      <div class="value" style="opacity:.85;">Peach orb row</div>
    </div>
    <div class="col" style="align-items:center; gap:10px;">
      <svg viewBox="0 0 160 50" width="160" height="54" aria-hidden="true">
        <g>
          <rect x="0"   y="10" width="30" height="30" transform="rotate(45 15 25)" fill="#3E5068"/>
          <circle cx="55" cy="32" r="8" fill="#C77860"/>
          <rect x="70"  y="10" width="30" height="30" transform="rotate(45 85 25)" fill="#3E5068"/>
          <circle cx="125" cy="32" r="8" fill="#C77860"/>
          <rect x="140" y="10" width="30" height="30" transform="rotate(45 155 25)" fill="#3E5068"/>
        </g>
      </svg>
      <div class="value" style="opacity:.85;">Diamond cluster</div>
    </div>
  </div>
</div>
</body></html>
