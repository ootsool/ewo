<!doctype html><html lang="he" dir="rtl"><head>
<meta charset="utf-8">
<title>Form inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .field { display:flex; flex-direction:column; gap:6px; flex:1; }
  .field label { font-family: var(--font-latin-text); font-size: 11px; letter-spacing: .08em; text-transform: uppercase; opacity:.7; }
  .field input, .field select {
    font-family: var(--font-hebrew-text); font-size: 15px;
    padding: 12px 14px;
    background: var(--ewo-cream);
    color: var(--ewo-navy-deep);
    border: none;
    border-radius: var(--r-md);
    box-shadow: var(--shadow-inset);
    outline: none;
    transition: box-shadow var(--dur-fast) var(--ease-quiet);
  }
  .field input:focus, .field select:focus {
    box-shadow: 0 0 0 2px var(--ewo-navy);
  }
</style>
</head><body>
<div class="card">
  <div class="col" style="gap:6px;">
    <div class="label" style="direction:ltr;">Form inputs · cream on terracotta</div>
  </div>
  <div class="row" style="gap:14px;">
    <div class="field">
      <label>שם מלא</label>
      <input type="text" value="רחל מזרחי" />
    </div>
    <div class="field">
      <label>כמות כרטיסים</label>
      <select><option>2 כרטיסים</option><option>1 כרטיס</option></select>
    </div>
  </div>
</div>
</body></html>
