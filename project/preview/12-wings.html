<div class="card">
  <div class="row" style="gap:18px;">
    <img src="../assets/poster-avraham-tal.jpg" alt="" style="width:140px; height:auto; object-fit:cover; border-radius:6px; box-shadow:var(--shadow-paper);">

      <div class="label">The wings — signature illustration</div>
      <div style="font-family:var(--font-latin-text); font-size:13px; line-height:1.45; color:var(--ewo-cream); opacity:.92;">

    </div>
  </div>
