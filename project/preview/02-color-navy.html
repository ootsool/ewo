<!doctype html><html lang="en" dir="ltr"><head>
<meta charset="utf-8">
<title>Navy family</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body>
<div class="card cream">
  <div class="row" style="gap:14px;">
    <div class="swatch dark" style="background:#2E5588; height:110px;">
      <div class="name">Navy</div>
      <div class="hex">#2E5588 · --ewo-navy</div>
    </div>
    <div class="swatch dark" style="background:#1F3F6A; height:110px;">
      <div class="name">Deep</div>
      <div class="hex">#1F3F6A · --ewo-navy-deep</div>
    </div>
    <div class="swatch dark" style="background:#5D7AA0; height:110px;">
      <div class="name">Soft</div>
      <div class="hex">#5D7AA0</div>
    </div>
    <div class="col" style="flex:1;">
      <div class="label">Ink, contemplative</div>
      <div style="font-family:var(--font-latin-text); font-size:13px; line-height:1.45;">
        Warm navy with an indigo lean. Never steel-blue. The logo roundel uses Deep; type and decorative diamonds use Navy.
      </div>
    </div>
  </div>
</div>
</body></html>
