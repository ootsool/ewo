<!doctype html><html lang="en" dir="ltr"><head>
<meta charset="utf-8">
<title>Cream & Peach</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body>
<div class="card">
  <div class="row" style="gap:14px;">
    <div class="swatch light" style="background:#F2F0E8; height:110px;">
      <div class="name">Cream</div>
      <div class="hex">#F2F0E8 · --ewo-cream</div>
    </div>
    <div class="swatch light" style="background:#E8E4D8; height:110px;">
      <div class="name">Cream soft</div>
      <div class="hex">#E8E4D8</div>
    </div>
    <div class="swatch dark" style="background:#E1957F; height:110px;">
      <div class="name">Peach</div>
      <div class="hex">#E1957F · --ewo-peach</div>
    </div>
    <div class="swatch dark" style="background:#C77860; height:110px;">
      <div class="name">Peach deep</div>
      <div class="hex">#C77860</div>
    </div>
    <div class="col" style="flex:1;">
      <div class="label">Paper & grace notes</div>
      <div style="font-family:var(--font-latin-text); font-size:13px; line-height:1.45; color:var(--ewo-cream); opacity:.92;">
        Cream is the brand's "white" — never pure #fff. Peach is the bead/orb accent; treat it as the 10% in a 60/30/10 mix.
      </div>
    </div>
  </div>
</div>
</body></html>
