<!doctype html><html lang="en" dir="ltr"><head>
<meta charset="utf-8">
<title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .stick { background: var(--ewo-cream); border-radius: 2px; height: 28px; }
  .stick-row { display: flex; align-items: center; gap: 14px; }
  .stick-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ewo-cream); opacity: .8; min-width: 90px; }
</style>
</head><body>
<div class="card">
  <div class="col" style="gap:6px;">
    <div class="label">Spacing scale · --s-N</div>
  </div>
  <div class="col" style="gap:10px;">
    <div class="stick-row"><div class="stick-label">--s-1 · 4px</div><div class="stick" style="width:4px;"></div></div>
    <div class="stick-row"><div class="stick-label">--s-2 · 8px</div><div class="stick" style="width:8px;"></div></div>
    <div class="stick-row"><div class="stick-label">--s-3 · 12px</div><div class="stick" style="width:12px;"></div></div>
    <div class="stick-row"><div class="stick-label">--s-4 · 16px</div><div class="stick" style="width:16px;"></div></div>
    <div class="stick-row"><div class="stick-label">--s-5 · 24px</div><div class="stick" style="width:24px;"></div></div>
    <div class="stick-row"><div class="stick-label">--s-6 · 32px</div><div class="stick" style="width:32px;"></div></div>
    <div class="stick-row"><div class="stick-label">--s-7 · 48px</div><div class="stick" style="width:48px;"></div></div>
    <div class="stick-row"><div class="stick-label">--s-8 · 64px</div><div class="stick" style="width:64px;"></div></div>
    <div class="stick-row"><div class="stick-label">--s-9 · 96px</div><div class="stick" style="width:96px;"></div></div>
    <div class="stick-row"><div class="stick-label">--s-10 · 128px</div><div class="stick" style="width:128px;"></div></div>
  </div>
</div>
</body></html>
