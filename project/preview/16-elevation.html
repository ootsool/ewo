<!doctype html><html lang="en" dir="ltr"><head>
<meta charset="utf-8">
<title>Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body>
<div class="card cream">
  <div class="col" style="gap:6px;">
    <div class="label">Elevation · paper, not glass</div>
    <div style="font-family:var(--font-latin-text); font-size:13px; line-height:1.45;">
      Shadows simulate printed cards on a wood table. Warm, not gray. No drop on the brand field unless a card is interactive.
    </div>
  </div>
  <div class="row" style="gap:24px; padding-top:8px; padding-bottom:16px;">
    <div class="col" style="align-items:center; gap:10px;">
      <div style="width:140px; height:90px; background:var(--ewo-cream-soft); border-radius:8px;"></div>
      <div class="value" style="opacity:.7;">flat<br>no shadow</div>
    </div>
    <div class="col" style="align-items:center; gap:10px;">
      <div style="width:140px; height:90px; background:var(--ewo-cream-soft); border-radius:8px; box-shadow: var(--shadow-paper);"></div>
      <div class="value" style="opacity:.7;">--shadow-paper<br>at-rest card</div>
    </div>
    <div class="col" style="align-items:center; gap:10px;">
      <div style="width:140px; height:90px; background:var(--ewo-cream-soft); border-radius:8px; box-shadow: var(--shadow-card);"></div>
      <div class="value" style="opacity:.7;">--shadow-card<br>hover / focused</div>
    </div>
  </div>
</div>
</body></html>
