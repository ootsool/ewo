<!doctype html><html lang="en" dir="ltr"><head>
<meta charset="utf-8">
<title>Terracotta family</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body>
<div class="card">
  <div class="row" style="gap:14px;">
    <div class="swatch dark" style="background:#C56351; height:110px;">
      <div class="name">Terracotta</div>
      <div class="hex">#C56351 · --ewo-terracotta</div>
    </div>
    <div class="swatch dark" style="background:#B05745; height:110px;">
      <div class="name">Deep</div>
      <div class="hex">#B05745</div>
    </div>
    <div class="swatch dark" style="background:#D27867; height:110px;">
      <div class="name">Light</div>
      <div class="hex">#D27867</div>
    </div>
    <div class="col" style="flex:1;">
      <div class="label">Primary brand field</div>
      <div style="font-family:var(--font-latin-text); font-size:13px; line-height:1.45; color:var(--ewo-cream); opacity:.92;">
        The poster red. Always shown with paper grain multiplied over it. 60% of any composition is this color.
      </div>
    </div>
  </div>
</div>
</body></html>
